name: cortexai

services:
  cortex-app:
    build: .
    container_name: cortex-app
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - aiobs_data:/app/data
    environment:
      - AIOBS_DB_PATH=/app/data/aiobs.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cortex.rule=Host(`cortex.hyperionailab.com`)"
      - "traefik.http.routers.cortex.entrypoints=websecure"
      - "traefik.http.routers.cortex.tls.certresolver=letsencrypt"
      - "traefik.http.services.cortex.loadbalancer.server.port=8000"
    networks:
      - default
      - web

volumes:
  aiobs_data:
    driver: local

networks:
  web:
    external: true
