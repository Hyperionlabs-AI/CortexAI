version: '3.9'

services:
  aiobs:
    build: .
    ports:
      - "8000:8000"    # dashboard + API at http://localhost:8000
    volumes:
      - aiobs_data:/app/data
    environment:
      - AIOBS_DB_PATH=/app/data/aiobs.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  aiobs_data:
    driver: local
